<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hệ thống quản lý văn bản</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Arial', sans-serif;
    }
    
    body {
      background-color: #f5f7fa;
      color: #333;
      line-height: 1.6;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    
    header {
      background: linear-gradient(135deg, #1e88e5, #0d47a1);
      color: white;
      padding: 20px 0;
      text-align: center;
      border-radius: 8px;
      margin-bottom: 30px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      position: relative;
    }
    
    header h1 {
      font-size: 28px;
      margin-bottom: 5px;
    }
    
    header p {
      font-size: 16px;
      opacity: 0.9;
    }
    
    .user-info {
      position: absolute;
      top: 15px;
      right: 15px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }
    
    .user-email {
      background: rgba(255, 255, 255, 0.2);
      padding: 6px 12px;
      border-radius: 15px;
      font-size: 14px;
    }
    
    .logout-btn {
      background: rgba(255, 255, 255, 0.3);
      border: none;
      color: white;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.3s;
      font-size: 13px;
    }
    
    .logout-btn:hover {
      background: rgba(255, 255, 255, 0.5);
    }
    
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .dashboard-card {
      background: white;
      border-radius: 8px;
      padding: 25px;
      text-align: center;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s, box-shadow 0.3s;
      cursor: pointer;
    }
    
    .dashboard-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
    }
    
    .card-icon {
      font-size: 40px;
      margin-bottom: 15px;
    }
    
    .card-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #1e88e5;
    }
    
    .card-description {
      font-size: 14px;
      color: #666;
    }
    
    .outgoing { border-top: 4px solid #4CAF50; }
    .incoming { border-top: 4px solid #2196F3; }
    .search { border-top: 4px solid #FF9800; }
    .summary { border-top: 4px solid #9C27B0; }
    
    footer {
      text-align: center;
      margin-top: 50px;
      padding: 20px;
      color: #666;
      font-size: 14px;
    }
    
    @media (max-width: 768px) {
      .dashboard-grid {
        grid-template-columns: 1fr;
      }
      
      .user-info {
        position: static;
        align-items: center;
        margin-top: 15px;
      }
      
      header {
        padding-bottom: 80px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>HỆ THỐNG QUẢN LÝ VĂN BẢN</h1>
      <p>Trang chủ</p>
      <div class="user-info">
        <div class="user-email" id="userEmail"></div>
        <button class="logout-btn" id="logoutBtn">Đăng xuất</button>
      </div>
    </header>
    
    <div class="dashboard-grid">
      <div class="dashboard-card outgoing">
        <div class="card-icon">📤</div>
        <div class="card-title">Văn bản đi</div>
        <div class="card-description">Quản lý các văn bản đã gửi đi</div>
      </div>
      
      <div class="dashboard-card incoming">
        <div class="card-icon">📥</div>
        <div class="card-title">Văn bản đến</div>
        <div class="card-description">Quản lý các văn bản đã nhận</div>
      </div>
      
      <div class="dashboard-card search">
        <div class="card-icon">🔍</div>
        <div class="card-title">Tìm kiếm</div>
        <div class="card-description">Tìm kiếm văn bản theo tiêu chí</div>
      </div>
      
      <div class="dashboard-card summary">
        <div class="card-icon">📊</div>
        <div class="card-title">Tổng hợp</div>
        <div class="card-description">Báo cáo tổng hợp và thống kê</div>
      </div>
    </div>
    
    <footer>
      <p>Hệ thống Quản lý Công văn © 2023. Phiên bản 1.0</p>
    </footer>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyBWKTyXVK1y2dqxWUWprIxd5CCHMzSMc_o",
      authDomain: "quan-ly-cong-van-dede3.firebaseapp.com",
      databaseURL: "https://quan-ly-cong-van-dede3-default-rtdb.firebaseio.com",
      projectId: "quan-ly-cong-van-dede3",
      storageBucket: "quan-ly-cong-van-dede3.firebasestorage.app",
      messagingSenderId: "1080528314069",
      appId: "1:1080528314069:web:831f1b3c497ba082f80c5c"
    };

    // Init Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const userEmail = document.getElementById("userEmail");
    const logoutBtn = document.getElementById("logoutBtn");

    // Theo dõi trạng thái đăng nhập
    onAuthStateChanged(auth, (user) => {
      if (user) {
        userEmail.innerText = user.email;
      } else {
        window.location.href = "index.html"; // Nếu chưa login thì quay lại form
      }
    });

    // Đăng xuất
    logoutBtn.addEventListener("click", async () => {
      await signOut(auth);
    });

    // Thêm sự kiện click cho các card
    document.querySelectorAll('.dashboard-card').forEach(card => {
      card.addEventListener('click', function() {
        const cardType = this.classList[1]; // Lấy class thứ hai để xác định loại card
        switch(cardType) {
          case 'outgoing':
          //  alert('Chuyển đến trang Công văn đi'); 
            window.location.href = 'cong-van-di.html';
            break;
          case 'incoming':
          //  alert('Chuyển đến trang Công văn đến');
            window.location.href = 'cong-van-den.html';
            break;
          case 'search':
            // alert('Chuyển đến trang Tìm kiếm');
            window.location.href = 'tim-kiem.html';
            break;
          case 'summary':
            // alert('Chuyển đến trang Tổng hợp');
            window.location.href = 'tong-hop.html';
            break;
        }
      });
    });
  </script>
</body>
</html>
