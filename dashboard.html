<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Quản lý văn bản</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-size: 12px;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #f0f2f5;
      height: 100vh;
      overflow: hidden;
    }

    /* Layout chính */
    .app {
      display: flex;
      height: 100vh;
      width: 100%;
      transition: all 0.2s;
    }

    /* ========= SIDEBAR ========= */
    .sidebar {
      width: 200px;
      background: linear-gradient(180deg, #0d2b3e 0%, #071826 100%);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: width 0.25s ease;
      overflow-x: hidden;
      overflow-y: auto;
      position: relative;
      z-index: 10;
    }

    /* Trạng thái thu gọn mặc định */
    .sidebar.collapsed {
      width: 65px;
    }

    /* Ẩn text khi thu gọn */
    .sidebar.collapsed .logo-area h3 span,
    .sidebar.collapsed .logo-area small,
    .sidebar.collapsed .nav-item span,
    .sidebar.collapsed .user-email,
    .sidebar.collapsed .logout-btn span {
      display: none;
    }

    /* Canh giữa icon khi thu gọn */
    .sidebar.collapsed .nav-item {
      justify-content: center;
      padding: 12px 0;
    }

    .sidebar.collapsed .nav-item i {
      margin: 0;
      font-size: 1.3rem;
    }

    .sidebar.collapsed .logout-btn {
      justify-content: center;
    }

    .sidebar.collapsed .logout-btn i {
      margin: 0;
    }

    .sidebar.collapsed .user-section {
      padding: 20px 12px;
    }

    /* ========= HIỆN TEXT KHI HOVER ========= */
    /* Với sidebar đang thu gọn, khi hover vào nav-item sẽ hiện text bên cạnh */
    .sidebar.collapsed .nav-item {
      position: relative;
    }

    .sidebar.collapsed .nav-item span {
      display: none;
      position: absolute;
      left: 55px;
      top: 50%;
      transform: translateY(-50%);
      background: #1e6f9f;
      color: white;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .sidebar.collapsed .nav-item:hover span {
      display: block;
      animation: fadeIn 0.15s ease;
    }

    /* Tooltip cho logo và user section khi collapsed */
    .sidebar.collapsed .logo-area {
      position: relative;
    }

    .sidebar.collapsed .logo-area .tooltip-text {
      display: none;
      position: absolute;
      left: 55px;
      top: 50%;
      transform: translateY(-50%);
      background: #1e6f9f;
      color: white;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      z-index: 100;
    }

    .sidebar.collapsed .logo-area:hover .tooltip-text {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-50%) translateX(-5px); }
      to { opacity: 1; transform: translateY(-50%) translateX(0); }
    }

    .logo-area {
      padding: 20px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo-area h3 {
      color: white;
      font-size: 18px;
      font-weight: 600;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-area small {
      color: #8aaec0;
      font-size: 11px;
      display: block;
      margin-top: 4px;
    }

    /* Nút toggle sidebar */
    .toggle-sidebar-btn {
      background: rgba(255, 255, 255, 0.15);
      border: none;
      color: white;
      width: 30px;
      height: 30px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .toggle-sidebar-btn:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: scale(1.05);
    }

    /* Menu items */
    .nav-menu {
      flex: 1;
      padding: 0 12px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      margin: 4px 0;
      border-radius: 12px;
      cursor: pointer;
      color: #cbd5e1;
      font-size: 14px;
      font-weight: 500;
      transition: 0.2s;
      white-space: nowrap;
    }

    .nav-item i {
      width: 24px;
      font-size: 1.1rem;
      text-align: center;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.08);
      color: white;
    }

    .nav-item.active {
      background: #1e6f9f;
      color: white;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }

    /* User section */
    .user-section {
      margin-top: auto;
      padding: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .user-email {
      background: rgba(255, 255, 255, 0.1);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 11px;
      text-align: center;
      margin-bottom: 12px;
      color: #ddd;
      word-break: break-all;
      transition: 0.2s;
    }

    .logout-btn {
      width: 100%;
      background: #dc3545;
      border: none;
      padding: 8px;
      border-radius: 30px;
      color: white;
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: 0.2s;
    }

    .logout-btn:hover {
      background: #c82333;
      transform: translateY(-1px);
    }

    /* Tooltip cho user email khi collapsed */
    .sidebar.collapsed .user-section {
      position: relative;
    }

    .sidebar.collapsed .user-email {
      position: relative;
    }

    .sidebar.collapsed .user-email .tooltip-email {
      display: none;
      position: absolute;
      left: 55px;
      top: 50%;
      transform: translateY(-50%);
      background: #1e6f9f;
      color: white;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
      z-index: 100;
    }

    .sidebar.collapsed .user-email:hover .tooltip-email {
      display: block;
    }

    /* ========= MAIN CONTENT ========= */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #f4f7fc;
      transition: all 0.25s ease;
    }

    .topbar {
      background: white;
      padding: 12px 24px;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    /* Nút toggle thứ 2 (hiện khi sidebar ẩn trên mobile) */
    .show-sidebar-btn {
      background: #eef2ff;
      border: none;
      width: 34px;
      height: 34px;
      border-radius: 10px;
      color: #1e4663;
      cursor: pointer;
      transition: 0.2s;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .show-sidebar-btn:hover {
      background: #e0e7ff;
      transform: scale(1.02);
    }

    .topbar h4 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
      color: #1e4663;
    }

    .iframe-container {
      flex: 1;
      padding: 16px 20px;
      overflow: auto;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 16px;
      background: white;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      transition: all 0.2s;
    }

    /* Scrollbar đẹp */
    .sidebar::-webkit-scrollbar {
      width: 3px;
    }

    .sidebar::-webkit-scrollbar-track {
      background: #0f2a36;
    }

    .sidebar::-webkit-scrollbar-thumb {
      background: #2c6e8f;
      border-radius: 10px;
    }

    /* Modal đổi mật khẩu - custom */
    .change-password-modal .modal-content {
      border-radius: 20px;
      border: none;
      box-shadow: 0 20px 35px -10px rgba(0,0,0,0.2);
    }
    .change-password-modal .modal-header {
      background: linear-gradient(105deg, #0d2b3e, #071826);
      color: white;
      border-radius: 20px 20px 0 0;
      border-bottom: none;
      padding: 16px 24px;
    }
    .change-password-modal .modal-header .btn-close {
      filter: brightness(0) invert(1);
    }
    .change-password-modal .modal-body {
      padding: 24px;
    }
    .change-password-modal .form-label {
      font-weight: 600;
      font-size: 12px;
      color: #1e4663;
      margin-bottom: 6px;
    }
    .change-password-modal .form-control {
      border-radius: 12px;
      border: 1px solid #dce3ec;
      padding: 8px 14px;
      font-size: 13px;
    }
    .change-password-modal .form-control:focus {
      border-color: #1e6f9f;
      box-shadow: 0 0 0 3px rgba(30,111,159,0.1);
    }
    .btn-change-password-submit {
      background: linear-gradient(105deg, #1e6f9f, #0d5a84);
      border: none;
      padding: 10px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 13px;
      transition: 0.2s;
    }
    .btn-change-password-submit:hover {
      transform: translateY(-1px);
      background: linear-gradient(105deg, #0d5a84, #094a6e);
    }
    .password-requirement {
      font-size: 10px;
      color: #6c757d;
      margin-top: 5px;
    }

    /* Responsive nhỏ */
    @media (max-width: 640px) {
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        height: 100vh;
        z-index: 1000;
        transform: translateX(0);
      }
      .sidebar.collapsed {
        transform: translateX(-100%);
        width: 0;
      }
      .show-sidebar-btn {
        display: flex !important;
      }
      .iframe-container {
        padding: 12px;
      }
    }
  </style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <div class="sidebar collapsed" id="sidebar">
    <div class="logo-area">
      <div>
        <h3><i class="fa-regular fa-folder-open"></i><span> Văn bản</span></h3>
        <small>Quản lý tập trung</small>
      </div>
      <button class="toggle-sidebar-btn" id="collapseSidebarBtn" title="Thu gọn">
        <i class="fa-solid fa-chevron-left"></i>
      </button>
      <span class="tooltip-text">Văn bản Office</span>
    </div>
    <div class="nav-menu">
      <div class="nav-item active" data-module="outgoing">
        <i class="fa-solid fa-paper-plane"></i><span>Văn bản đi</span>
      </div>
      <div class="nav-item" data-module="incoming">
        <i class="fa-solid fa-inbox"></i><span>Văn bản đến</span>
      </div>
      <div class="nav-item" data-module="search">
        <i class="fa-solid fa-magnifying-glass"></i><span>Tìm kiếm</span>
      </div>
      <div class="nav-item" data-module="summary">
        <i class="fa-solid fa-chart-simple"></i><span>Tổng hợp</span>
      </div>
      <!-- Mục Đổi mật khẩu mới -->
      <div class="nav-item" id="changePasswordNavItem" data-module="changepassword">
        <i class="fa-solid fa-key"></i><span>Đổi mật khẩu</span>
      </div>
    </div>
    <div class="user-section">
      <div class="user-email" id="userEmail">
        Đang tải...
        <span class="tooltip-email" id="userEmailTooltip">Đang tải...</span>
      </div>
      <button class="logout-btn" id="logoutBtn">
        <i class="fa-solid fa-arrow-right-from-bracket"></i><span>Đăng xuất</span>
      </button>
    </div>
  </div>

  <!-- Main content -->
  <div class="main">
    <div class="topbar">
      <button class="show-sidebar-btn" id="showSidebarBtn" title="Hiện menu" style="display: none;">
        <i class="fa-solid fa-bars"></i>
      </button>
      <h4 id="pageTitle"><i class="fa-solid fa-paper-plane me-2"></i>Văn bản đi</h4>
    </div>
    <div class="iframe-container">
      <iframe id="contentFrame" src="cong-van-di.html"></iframe>
    </div>
  </div>
</div>

<!-- Modal Đổi mật khẩu -->
<div class="modal fade change-password-modal" id="changePasswordModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="fa-solid fa-key me-2"></i>Đổi mật khẩu</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="changePasswordForm">
          <div class="mb-3">
            <label class="form-label">Mật khẩu hiện tại</label>
            <input type="password" class="form-control" id="currentPassword" required placeholder="Nhập mật khẩu hiện tại">
          </div>
          <div class="mb-3">
            <label class="form-label">Mật khẩu mới</label>
            <input type="password" class="form-control" id="newPassword" required placeholder="Ít nhất 6 ký tự">
            <div class="password-requirement">Mật khẩu phải có ít nhất 6 ký tự</div>
          </div>
          <div class="mb-4">
            <label class="form-label">Xác nhận mật khẩu mới</label>
            <input type="password" class="form-control" id="confirmNewPassword" required placeholder="Nhập lại mật khẩu mới">
          </div>
          <div id="passwordErrorMsg" class="alert alert-danger d-none" style="font-size: 12px; padding: 8px 12px;"></div>
          <button type="submit" class="btn btn-change-password-submit w-100 text-white">
            <i class="fa-solid fa-check-circle me-1"></i> Cập nhật mật khẩu
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import { getAuth, signOut, onAuthStateChanged, updatePassword, EmailAuthProvider, reauthenticateWithCredential } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBWKTyXVK1y2dqxWUWprIxd5CCHMzSMc_o",
    authDomain: "quan-ly-cong-van-dede3.firebaseapp.com",
    databaseURL: "https://quan-ly-cong-van-dede3-default-rtdb.firebaseio.com",
    projectId: "quan-ly-cong-van-dede3",
    storageBucket: "quan-ly-cong-van-dede3.firebasestorage.app",
    messagingSenderId: "1080528314069",
    appId: "1:1080528314069:web:831f1b3c497ba082f80c5c"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // Modules mapping
  const modules = {
    outgoing: { url: "cong-van-di.html", title: "Văn bản đi", icon: "fa-solid fa-paper-plane" },
    incoming: { url: "cong-van-den.html", title: "Văn bản đến", icon: "fa-solid fa-inbox" },
    search: { url: "tim-kiem.html", title: "Tìm kiếm", icon: "fa-solid fa-magnifying-glass" },
    summary: { url: "tong-hop.html", title: "Tổng hợp & Báo cáo", icon: "fa-solid fa-chart-simple" }
  };

  // DOM elements
  const sidebar = document.getElementById('sidebar');
  const collapseBtn = document.getElementById('collapseSidebarBtn');
  const showSidebarBtn = document.getElementById('showSidebarBtn');
  const contentFrame = document.getElementById('contentFrame');
  const pageTitle = document.getElementById('pageTitle');
  const changePasswordNavItem = document.getElementById('changePasswordNavItem');
  
  let currentUserEmail = '';

  // Toggle sidebar collapse
  function toggleSidebar(collapse) {
    if (collapse) {
      sidebar.classList.add('collapsed');
      localStorage.setItem('sidebarCollapsed', 'true');
      if (window.innerWidth <= 640) {
        sidebar.style.transform = 'translateX(-100%)';
        showSidebarBtn.style.display = 'flex';
      }
    } else {
      sidebar.classList.remove('collapsed');
      localStorage.setItem('sidebarCollapsed', 'false');
      if (window.innerWidth <= 640) {
        sidebar.style.transform = 'translateX(0)';
        showSidebarBtn.style.display = 'none';
      }
    }
  }

  // Lưu trạng thái sidebar (mặc định là collapsed)
  function loadSidebarState() {
    const isCollapsed = localStorage.getItem('sidebarCollapsed') !== 'false';
    if (isCollapsed) {
      sidebar.classList.add('collapsed');
      if (window.innerWidth <= 640) {
        sidebar.style.transform = 'translateX(-100%)';
        showSidebarBtn.style.display = 'flex';
      }
    } else {
      sidebar.classList.remove('collapsed');
      if (window.innerWidth <= 640) {
        sidebar.style.transform = 'translateX(0)';
        showSidebarBtn.style.display = 'none';
      }
    }
  }

  // Sự kiện nút thu gọn
  if (collapseBtn) {
    collapseBtn.addEventListener('click', () => {
      const isCurrentlyCollapsed = sidebar.classList.contains('collapsed');
      toggleSidebar(!isCurrentlyCollapsed);
    });
  }

  // Sự kiện nút hiện sidebar (khi đang ẩn trên mobile)
  if (showSidebarBtn) {
    showSidebarBtn.addEventListener('click', () => {
      toggleSidebar(false);
    });
  }

  // Xử lý resize cho responsive
  window.addEventListener('resize', () => {
    if (window.innerWidth <= 640) {
      const isCollapsed = sidebar.classList.contains('collapsed');
      if (isCollapsed) {
        sidebar.style.transform = 'translateX(-100%)';
        showSidebarBtn.style.display = 'flex';
      } else {
        sidebar.style.transform = 'translateX(0)';
        showSidebarBtn.style.display = 'none';
      }
    } else {
      sidebar.style.transform = '';
      showSidebarBtn.style.display = 'none';
    }
  });

  // Active menu & chuyển iframe
  function setActiveModule(moduleKey) {
    document.querySelectorAll('.nav-item').forEach(el => {
      const mod = el.getAttribute('data-module');
      if (mod === moduleKey) {
        el.classList.add('active');
      } else {
        el.classList.remove('active');
      }
    });
    
    // Nếu chọn mục đổi mật khẩu -> mở modal, không load iframe
    if (moduleKey === 'changepassword') {
      const modal = new bootstrap.Modal(document.getElementById('changePasswordModal'));
      modal.show();
      // Giữ lại title và iframe như cũ, không thay đổi
      return;
    }
    
    const m = modules[moduleKey];
    if (m) {
      contentFrame.src = m.url;
      pageTitle.innerHTML = `<i class="${m.icon} me-2"></i>${m.title}`;
    }
    localStorage.setItem('currentModule', moduleKey);
  }

  // Gán sự kiện cho menu (bao gồm cả đổi mật khẩu)
  document.querySelectorAll('.nav-item').forEach(el => {
    el.addEventListener('click', () => {
      const moduleKey = el.getAttribute('data-module');
      if (moduleKey) {
        setActiveModule(moduleKey);
        if (window.innerWidth <= 640) {
          toggleSidebar(true);
        }
      }
    });
  });

  // Xử lý riêng cho nút đổi mật khẩu trong modal
  const modalElement = document.getElementById('changePasswordModal');
  let passwordModal = null;
  
  function initModal() {
    passwordModal = new bootstrap.Modal(modalElement, {
      backdrop: 'static',
      keyboard: false
    });
  }
  
  // Hàm hiển thị thông báo lỗi/ thành công tạm thời
  function showPasswordMessage(message, isError = true) {
    const errorDiv = document.getElementById('passwordErrorMsg');
    if (errorDiv) {
      errorDiv.textContent = message;
      errorDiv.classList.remove('d-none');
      if (!isError) {
        errorDiv.classList.remove('alert-danger');
        errorDiv.classList.add('alert-success');
      } else {
        errorDiv.classList.remove('alert-success');
        errorDiv.classList.add('alert-danger');
      }
      setTimeout(() => {
        errorDiv.classList.add('d-none');
      }, 4000);
    }
  }
  
  // Xử lý đổi mật khẩu
  const changePasswordForm = document.getElementById('changePasswordForm');
  if (changePasswordForm) {
    changePasswordForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const currentPassword = document.getElementById('currentPassword').value;
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmNewPassword').value;
      
      // Validate
      if (!currentPassword || !newPassword || !confirmPassword) {
        showPasswordMessage('Vui lòng điền đầy đủ thông tin!', true);
        return;
      }
      if (newPassword.length < 6) {
        showPasswordMessage('Mật khẩu mới phải có ít nhất 6 ký tự!', true);
        return;
      }
      if (newPassword !== confirmPassword) {
        showPasswordMessage('Mật khẩu xác nhận không khớp!', true);
        return;
      }
      
      const user = auth.currentUser;
      if (!user || !user.email) {
        showPasswordMessage('Không tìm thấy thông tin người dùng! Vui lòng đăng nhập lại.', true);
        return;
      }
      
      // Re-authenticate
      const credential = EmailAuthProvider.credential(user.email, currentPassword);
      try {
        // Hiệu ứng loading trên nút
        const submitBtn = changePasswordForm.querySelector('button[type="submit"]');
        const originalText = submitBtn.innerHTML;
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-1"></i> Đang xử lý...';
        
        await reauthenticateWithCredential(user, credential);
        await updatePassword(user, newPassword);
        
        // Thành công
        showPasswordMessage('Đổi mật khẩu thành công! Vui lòng đăng nhập lại.', false);
        setTimeout(() => {
          if (passwordModal) passwordModal.hide();
          // Reset form
          changePasswordForm.reset();
          // Đăng xuất và về trang login
          signOut(auth).then(() => {
            window.location.href = 'index.html';
          });
        }, 1500);
      } catch (error) {
        console.error(error);
        let errorMsg = 'Đổi mật khẩu thất bại. ';
        if (error.code === 'auth/wrong-password') {
          errorMsg += 'Mật khẩu hiện tại không đúng.';
        } else if (error.code === 'auth/weak-password') {
          errorMsg += 'Mật khẩu mới quá yếu.';
        } else {
          errorMsg += error.message;
        }
        showPasswordMessage(errorMsg, true);
        // Reset nút
        const submitBtn = changePasswordForm.querySelector('button[type="submit"]');
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fa-solid fa-check-circle me-1"></i> Cập nhật mật khẩu';
      }
    });
  }
  
  // Reset form khi modal đóng
  if (modalElement) {
    modalElement.addEventListener('hidden.bs.modal', () => {
      const errorDiv = document.getElementById('passwordErrorMsg');
      if (errorDiv) errorDiv.classList.add('d-none');
      const form = document.getElementById('changePasswordForm');
      if (form) form.reset();
      // active lại module cũ (không làm mất trạng thái)
      const savedModule = localStorage.getItem('currentModule');
      if (savedModule && modules[savedModule]) {
        document.querySelectorAll('.nav-item').forEach(el => {
          if (el.getAttribute('data-module') === savedModule) {
            el.classList.add('active');
          } else {
            el.classList.remove('active');
          }
        });
      }
    });
  }

  // Cập nhật tooltip email
  function updateEmailTooltip(email) {
    const userEmailSpan = document.getElementById('userEmail');
    const userEmailTooltip = document.getElementById('userEmailTooltip');
    if (userEmailSpan) userEmailSpan.innerText = email;
    if (userEmailTooltip) userEmailTooltip.innerText = email;
    currentUserEmail = email;
  }

  // Firebase auth
  onAuthStateChanged(auth, (user) => {
    if (user) {
      updateEmailTooltip(user.email);
      initModal();
    } else {
      window.location.href = 'index.html';
    }
  });

  // Logout
  const logoutBtn = document.getElementById('logoutBtn');
  if (logoutBtn) {
    logoutBtn.addEventListener('click', async () => {
      await signOut(auth);
      window.location.href = 'index.html';
    });
  }

  // Khôi phục trạng thái (mặc định sidebar đã thu gọn)
  loadSidebarState();
  const savedModule = localStorage.getItem('currentModule');
  if (savedModule && modules[savedModule]) {
    setActiveModule(savedModule);
  } else {
    setActiveModule('outgoing');
  }
  
  // Đảm bảo rằng khi click vào "Đổi mật khẩu" không ảnh hưởng đến iframe
  if (changePasswordNavItem) {
    changePasswordNavItem.addEventListener('click', (e) => {
      e.preventDefault();
      // Đã xử lý trong setActiveModule, nhưng cần đảm bảo active class
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      changePasswordNavItem.classList.add('active');
      // Không thay đổi iframe, không lưu module
    });
  }
</script>
</body>
</html>
