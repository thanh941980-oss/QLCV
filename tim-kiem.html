<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tra cứu công văn</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    
    body {
      background-color: #f0f2f5;
      color: #333;
      line-height: 1.5;
      padding: 15px;
      font-size: 14px;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      padding: 20px;
    }
    
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid #eaeaea;
    }
    
    h1 {
      color: #1a73e8;
      font-size: 22px;
      font-weight: 600;
    }
    
    .back-btn {
      background: #5f6368;
      color: white;
      border: none;
      padding: 8px 14px;
      border-radius: 5px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      font-size: 13px;
      transition: all 0.2s;
    }
    
    .back-btn:hover {
      background: #4e5154;
    }
    
    .filter-section {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
      align-items: flex-end;
      flex-wrap: wrap;
    }
    
    .filter-group {
      display: flex;
      flex-direction: column;
    }
    
    .filter-group label {
      margin-bottom: 6px;
      font-weight: 600;
      color: #0e4d9b;
      font-size: 13px;
    }
    
    .filter-group select, 
    .filter-group input {
      padding: 8px 10px;
      border: 1px solid #dadce0;
      border-radius: 5px;
      font-size: 13px;
      height: 38px;
      min-width: 180px;
    }
    
    .action-buttons {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .btn {
      padding: 10px 16px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: 500;
      font-size: 14px;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    
    .btn-primary {
      background: #1a73e8;
      color: white;
    }
    
    .btn-primary:hover {
      background: #1967d2;
    }
    
    .btn-success {
      background: #0f9d58;
      color: white;
    }
    
    .btn-success:hover {
      background: #0b8046;
    }
    
    .btn-secondary {
      background: #5f6368;
      color: white;
    }
    
    .btn-secondary:hover {
      background: #4e5154;
    }
    
    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: #1a73e8;
      margin: 20px 0 12px 0;
      padding-bottom: 6px;
      border-bottom: 1px solid #eaeaea;
    }
    
    .table-wrapper {
      overflow-x: auto;
      margin: 15px 0;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    
    th, td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid #e0e0e0;
    }
    
    th {
      background-color: #f8f9fa;
      font-weight: 600;
      color: #5f6368;
      font-size: 13px;
      position: sticky;
      top: 0;
    }
    
    th input {
      width: 100%;
      padding: 6px;
      margin-top: 5px;
      border: 1px solid #ddd;
      border-radius: 3px;
      font-size: 12px;
      font-weight: normal;
    }
    
    tr:last-child td {
      border-bottom: none;
    }
    
    tr:nth-child(even) {
      background-color: #fafafa;
    }
    
    tr:hover {
      background-color: #f1f3f4;
    }
    
    .loading {
      display: none;
      text-align: center;
      padding: 40px;
      color: #5f6368;
      font-size: 14px;
    }
    
    .loading i {
      font-size: 24px;
      margin-bottom: 10px;
      display: inline-block;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .notification {
      position: fixed;
      top: 15px;
      right: 15px;
      padding: 12px 18px;
      border-radius: 6px;
      color: white;
      display: none;
      z-index: 1000;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      font-weight: 500;
      font-size: 13px;
    }
    
    .success {
      background: #34a853;
    }
    
    .error {
      background: #ea4335;
    }
    
    .info {
      background: #1a73e8;
    }
    
    .no-data {
      text-align: center;
      padding: 40px;
      color: #9aa0a6;
    }
    
    .badge {
      display: inline-block;
      padding: 4px 8px;
      background: #e8f0fe;
      color: #1a73e8;
      border-radius: 4px;
      font-size: 11px;
    }
    
    @media (max-width: 1024px) {
      .filter-section {
        flex-direction: column;
        align-items: flex-start;
      }
    }
    
    @media (max-width: 768px) {
      .action-buttons {
        flex-direction: column;
      }
      
      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1><i class="fas fa-search"></i> TRA CỨU CÔNG VĂN</h1>
      <a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i> Quay lại</a>
    </header>
    
    <div class="filter-section">
      <div class="filter-group">
        <label for="loai-cong-van"><i class="fas fa-file-alt"></i> Loại công văn</label>
        <select id="loai-cong-van">
          <option value="di">Công văn đi</option>
          <option value="den">Công văn đến</option>
        </select>
      </div>
      
      <div class="filter-group">
        <label for="nam"><i class="fas fa-calendar"></i> Năm</label>
        <select id="nam">
          <option value="">Tất cả năm</option>
        </select>
      </div>
      
      <div class="filter-group">
        <label for="tim-kiem"><i class="fas fa-search"></i> Tìm kiếm chung</label>
        <input type="text" id="tim-kiem" placeholder="Nhập từ khóa...">
      </div>
    </div>
    
    <div class="action-buttons">
      <button class="btn btn-primary" id="hien-tat-ca-btn"><i class="fas fa-eye"></i> Hiện tất cả</button>
      <button class="btn btn-success" id="xuat-excel-btn"><i class="fas fa-file-excel"></i> Xuất Excel</button>
    </div>
    
    <div class="section-title"><i class="fas fa-list"></i> Kết quả tra cứu</div>
    <div class="loading" id="loading"><i class="fas fa-spinner"></i><br>Đang tải dữ liệu...</div>
    
    <!-- Bảng kết quả cho công văn đi -->
    <div id="wrapper-cong-van-di" class="table-wrapper" style="display: none;">
      <table id="table-cong-van-di">
        <thead>
          <tr>
            <th width="4%">STT</th>
            <th width="8%">Năm <input type="text" class="column-filter" data-column="1" placeholder="Lọc..."></th>
            <th width="10%">Số VB <input type="text" class="column-filter" data-column="2" placeholder="Lọc..."></th>
            <th width="15%">Tên VB <input type="text" class="column-filter" data-column="3" placeholder="Lọc..."></th>
            <th width="10%">Ngày ký <input type="text" class="column-filter" data-column="4" placeholder="Lọc..."></th>
            <th width="12%">Người ký <input type="text" class="column-filter" data-column="5" placeholder="Lọc..."></th>
            <th width="15%">Nơi ban hành <input type="text" class="column-filter" data-column="6" placeholder="Lọc..."></th>
            <th width="26%">Nội dung <input type="text" class="column-filter" data-column="7" placeholder="Lọc..."></th>
          </tr>
        </thead>
        <tbody id="body-cong-van-di">
          <tr><td colspan="8" class="no-data">Chưa có dữ liệu</td></tr>
        </tbody>
      </table>
    </div>
    
    <!-- Bảng kết quả cho công văn đến -->
    <div id="wrapper-cong-van-den" class="table-wrapper" style="display: none;">
      <table id="table-cong-van-den">
        <thead>
          <tr>
            <th width="4%">STT</th>
            <th width="7%">Năm <input type="text" class="column-filter" data-column="1" placeholder="Lọc..."></th>
            <th width="8%">Số đến <input type="text" class="column-filter" data-column="2" placeholder="Lọc..."></th>
            <th width="10%">Người nhận <input type="text" class="column-filter" data-column="3" placeholder="Lọc..."></th>
            <th width="9%">Ngày nhận <input type="text" class="column-filter" data-column="4" placeholder="Lọc..."></th>
            <th width="8%">Số CV <input type="text" class="column-filter" data-column="5" placeholder="Lọc..."></th>
            <th width="15%">Tên VB <input type="text" class="column-filter" data-column="6" placeholder="Lọc..."></th>
            <th width="9%">Ngày ký <input type="text" class="column-filter" data-column="7" placeholder="Lọc..."></th>
            <th width="12%">Người ký <input type="text" class="column-filter" data-column="8" placeholder="Lọc..."></th>
            <th width="12%">Nơi BH <input type="text" class="column-filter" data-column="9" placeholder="Lọc..."></th>
            <th width="6%">Số tờ <input type="text" class="column-filter" data-column="10" placeholder="Lọc..."></th>
          </tr>
        </thead>
        <tbody id="body-cong-van-den">
          <tr><td colspan="11" class="no-data">Chưa có dữ liệu</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div id="successNotification" class="notification success"></div>
  <div id="errorNotification" class="notification error"></div>
  <div id="infoNotification" class="notification info"></div>

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <!-- Thư viện SheetJS (xlsx) để xuất Excel -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyBWKTyXVK1y2dqxWUWprIxd5CCHMzSMc_o",
      authDomain: "quan-ly-cong-van-dede3.firebaseapp.com",
      databaseURL: "https://quan-ly-cong-van-dede3-default-rtdb.firebaseio.com",
      projectId: "quan-ly-cong-van-dede3",
      storageBucket: "quan-ly-cong-van-dede3.firebasestorage.app",
      messagingSenderId: "1080528314069",
      appId: "1:1080528314069:web:831f1b3c497ba082f80c5c"
    };

    // Khởi tạo Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const database = getDatabase(app);

    // Biến toàn cục
    let currentUser = null;
    let currentUid = null;
    let allCongVanDi = [];
    let allCongVanDen = [];
    let allYears = new Set();

    // Helper: lấy path theo user
    function getUserPath(path) {
      return `users/${currentUid}/${path}`;
    }

    // Hiển thị thông báo
    function showNotification(message, isSuccess = true, isInfo = false) {
      const notifId = isInfo ? 'infoNotification' : (isSuccess ? 'successNotification' : 'errorNotification');
      const notification = document.getElementById(notifId);
      notification.textContent = message;
      notification.style.display = 'block';
      setTimeout(() => {
        notification.style.display = 'none';
      }, 3000);
    }

    // Lọc dữ liệu theo từ khóa
    function filterData(data, searchTerm) {
      if (!searchTerm) return data;
      const term = searchTerm.toLowerCase();
      return data.filter(item => {
        return Object.values(item).some(value => 
          value && value.toString().toLowerCase().includes(term)
        );
      });
    }

    // Lọc dữ liệu theo cột
    function filterByColumn(data, columnIndex, filterValue, loaiCongVan) {
      if (!filterValue) return data;
      const term = filterValue.toLowerCase();
      
      return data.filter(item => {
        let value;
        
        if (loaiCongVan === 'di') {
          const columnMap = {
            1: item.year,
            2: item.documentNumber,
            3: item.documentName,
            4: item.signDate,
            5: item.signer,
            6: item.issuingPlace,
            7: item.content
          };
          value = columnMap[columnIndex];
        } else {
          const columnMap = {
            1: item.year,
            2: item.soDen,
            3: item.nguoiNhan,
            4: item.ngayNhan,
            5: item.soCongVan,
            6: item.tenVanBan,
            7: item.ngayKy,
            8: item.nguoiKy,
            9: item.noiBanHanh,
            10: item.soTo
          };
          value = columnMap[columnIndex];
        }
        
        return value && value.toString().toLowerCase().includes(term);
      });
    }

    // Cập nhật danh sách năm
    function updateYearOptions() {
      const yearSelect = document.getElementById('nam');
      const currentValue = yearSelect.value;
      
      const years = Array.from(allYears).sort((a, b) => b - a);
      yearSelect.innerHTML = '<option value="">Tất cả năm</option>';
      years.forEach(year => {
        const option = document.createElement('option');
        option.value = year;
        option.textContent = year;
        if (currentValue === year) option.selected = true;
        yearSelect.appendChild(option);
      });
    }

    // Hiển thị công văn đi
    function displayCongVanDi(data) {
      const tableBody = document.getElementById('body-cong-van-di');
      tableBody.innerHTML = '';
      
      if (data.length === 0) {
        tableBody.innerHTML = '<tr><td colspan="8" class="no-data"><i class="fas fa-folder-open"></i> Không có dữ liệu</td></tr>';
        return;
      }
      
      data.forEach((item, index) => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td class="badge" style="text-align:center">${index + 1}</td>
          <td>${item.year || ''}</td>
          <td><strong>${item.documentNumber || ''}</strong></td>
          <td>${item.documentName || ''}</td>
          <td>${item.signDate || ''}</td>
          <td>${item.signer || ''}</td>
          <td>${item.issuingPlace || ''}</td>
          <td style="max-width:300px; white-space:normal">${item.content || ''}</td>
        `;
        tableBody.appendChild(row);
      });
    }

    // Hiển thị công văn đến
    function displayCongVanDen(data) {
      const tableBody = document.getElementById('body-cong-van-den');
      tableBody.innerHTML = '';
      
      if (data.length === 0) {
        tableBody.innerHTML = '<tr><td colspan="11" class="no-data"><i class="fas fa-folder-open"></i> Không có dữ liệu</td></tr>';
        return;
      }
      
      data.forEach((item, index) => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td class="badge" style="text-align:center">${index + 1}</td>
          <td>${item.year || ''}</td>
          <td><strong>${item.soDen || ''}</strong></td>
          <td>${item.nguoiNhan || ''}</td>
          <td>${item.ngayNhan || ''}</td>
          <td>${item.soCongVan || ''}</td>
          <td>${item.tenVanBan || ''}</td>
          <td>${item.ngayKy || ''}</td>
          <td>${item.nguoiKy || ''}</td>
          <td>${item.noiBanHanh || ''}</td>
          <td>${item.soTo || ''}</td>
        `;
        tableBody.appendChild(row);
      });
    }

    // Xử lý tìm kiếm và lọc
    function handleSearchAndFilter() {
      const loaiCongVan = document.getElementById('loai-cong-van').value;
      const nam = document.getElementById('nam').value;
      const searchTerm = document.getElementById('tim-kiem').value;
      
      let data = loaiCongVan === 'di' ? [...allCongVanDi] : [...allCongVanDen];
      
      // Lọc theo năm
      if (nam) {
        data = data.filter(item => item.year === nam);
      }
      
      // Lọc theo từ khóa tìm kiếm
      if (searchTerm) {
        data = filterData(data, searchTerm);
      }
      
      // Lọc theo các cột
      document.querySelectorAll('.column-filter').forEach(input => {
        const columnIndex = parseInt(input.getAttribute('data-column'));
        const filterValue = input.value;
        if (filterValue) {
          data = filterByColumn(data, columnIndex, filterValue, loaiCongVan);
        }
      });
      
      // Hiển thị kết quả
      if (loaiCongVan === 'di') {
        displayCongVanDi(data);
      } else {
        displayCongVanDen(data);
      }
    }

    // Xuất dữ liệu ra Excel
    function exportToExcel() {
      const loaiCongVan = document.getElementById('loai-cong-van').value;
      let dataToExport = [];
      let fileName = '';
      
      if (loaiCongVan === 'di') {
        // Lấy dữ liệu đang hiển thị (đã lọc)
        const nam = document.getElementById('nam').value;
        const searchTerm = document.getElementById('tim-kiem').value;
        let tempData = [...allCongVanDi];
        
        if (nam) tempData = tempData.filter(item => item.year === nam);
        if (searchTerm) tempData = filterData(tempData, searchTerm);
        
        document.querySelectorAll('#wrapper-cong-van-di .column-filter').forEach(input => {
          const colIndex = parseInt(input.dataset.column);
          const filterVal = input.value;
          if (filterVal) tempData = filterByColumn(tempData, colIndex, filterVal, 'di');
        });
        
        dataToExport = tempData;
        fileName = `Cong_van_di_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.xlsx`;
        
        const ws_data = [
          ['STT', 'Năm', 'Số VB', 'Tên VB', 'Ngày ký', 'Người ký', 'Nơi ban hành', 'Nội dung']
        ];
        
        dataToExport.forEach((item, index) => {
          ws_data.push([
            index + 1,
            item.year || '',
            item.documentNumber || '',
            item.documentName || '',
            item.signDate || '',
            item.signer || '',
            item.issuingPlace || '',
            item.content || ''
          ]);
        });
        
        const ws = XLSX.utils.aoa_to_sheet(ws_data);
        ws['!cols'] = [{wch:5},{wch:8},{wch:15},{wch:25},{wch:12},{wch:15},{wch:20},{wch:40}];
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Công văn đi");
        XLSX.writeFile(wb, fileName);
        
      } else {
        const nam = document.getElementById('nam').value;
        const searchTerm = document.getElementById('tim-kiem').value;
        let tempData = [...allCongVanDen];
        
        if (nam) tempData = tempData.filter(item => item.year === nam);
        if (searchTerm) tempData = filterData(tempData, searchTerm);
        
        document.querySelectorAll('#wrapper-cong-van-den .column-filter').forEach(input => {
          const colIndex = parseInt(input.dataset.column);
          const filterVal = input.value;
          if (filterVal) tempData = filterByColumn(tempData, colIndex, filterVal, 'den');
        });
        
        dataToExport = tempData;
        fileName = `Cong_van_den_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.xlsx`;
        
        const ws_data = [
          ['STT', 'Năm', 'Số đến', 'Người nhận', 'Ngày nhận', 'Số CV', 'Tên VB', 'Ngày ký', 'Người ký', 'Nơi ban hành', 'Số tờ']
        ];
        
        dataToExport.forEach((item, index) => {
          ws_data.push([
            index + 1,
            item.year || '',
            item.soDen || '',
            item.nguoiNhan || '',
            item.ngayNhan || '',
            item.soCongVan || '',
            item.tenVanBan || '',
            item.ngayKy || '',
            item.nguoiKy || '',
            item.noiBanHanh || '',
            item.soTo || ''
          ]);
        });
        
        const ws = XLSX.utils.aoa_to_sheet(ws_data);
        ws['!cols'] = [{wch:5},{wch:8},{wch:12},{wch:15},{wch:12},{wch:12},{wch:25},{wch:12},{wch:15},{wch:20},{wch:8}];
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Công văn đến");
        XLSX.writeFile(wb, fileName);
      }
      
      showNotification(`Xuất file Excel thành công! (${dataToExport.length} dòng)`, true);
    }

    // Tải dữ liệu từ Firebase
    function loadData() {
      if (!currentUid) return;
      
      document.getElementById('loading').style.display = 'block';
      allYears.clear();
      
      // Lấy dữ liệu công văn đi
      const congVanDiRef = ref(database, getUserPath('congVanDi'));
      onValue(congVanDiRef, (snapshot) => {
        if (snapshot.exists()) {
          allCongVanDi = Object.values(snapshot.val());
          allCongVanDi.forEach(item => {
            if (item.year) allYears.add(item.year);
          });
        } else {
          allCongVanDi = [];
        }
        
        // Lấy dữ liệu công văn đến
        const congVanDenRef = ref(database, getUserPath('congVanDen'));
        onValue(congVanDenRef, (snapshot) => {
          if (snapshot.exists()) {
            allCongVanDen = Object.values(snapshot.val());
            allCongVanDen.forEach(item => {
              if (item.year) allYears.add(item.year);
            });
          } else {
            allCongVanDen = [];
          }
          
          document.getElementById('loading').style.display = 'none';
          updateYearOptions();
          
          // Hiển thị dữ liệu mặc định (công văn đi)
          document.getElementById('wrapper-cong-van-di').style.display = 'block';
          document.getElementById('wrapper-cong-van-den').style.display = 'none';
          displayCongVanDi(allCongVanDi);
          
          showNotification(`Đã tải dữ liệu: ${allCongVanDi.length} công văn đi, ${allCongVanDen.length} công văn đến`, true, true);
        }, (error) => {
          document.getElementById('loading').style.display = 'none';
          console.error('Lỗi khi tải công văn đến:', error);
          showNotification('Có lỗi xảy ra khi tải dữ liệu công văn đến', false);
        });
      }, (error) => {
        document.getElementById('loading').style.display = 'none';
        console.error('Lỗi khi tải công văn đi:', error);
        showNotification('Có lỗi xảy ra khi tải dữ liệu công văn đi', false);
      });
    }

    // Khởi tạo trang
    document.addEventListener('DOMContentLoaded', function() {
      onAuthStateChanged(auth, (user) => {
        if (user) {
          currentUser = user;
          currentUid = user.uid;
          console.log('Đã đăng nhập:', user.email, 'UID:', currentUid);
          
          loadData();
        } else {
          window.location.href = 'index.html';
        }
      });
      
      // Xử lý thay đổi loại công văn
      document.getElementById('loai-cong-van').addEventListener('change', function() {
        const loaiCongVan = this.value;
        
        document.getElementById('wrapper-cong-van-di').style.display = loaiCongVan === 'di' ? 'block' : 'none';
        document.getElementById('wrapper-cong-van-den').style.display = loaiCongVan === 'den' ? 'block' : 'none';
        
        if (loaiCongVan === 'di') {
          handleSearchAndFilter();
        } else {
          handleSearchAndFilter();
        }
      });
      
      // Xử lý tìm kiếm
      document.getElementById('tim-kiem').addEventListener('input', handleSearchAndFilter);
      document.getElementById('nam').addEventListener('change', handleSearchAndFilter);
      
      // Xử lý lọc theo cột - sử dụng event delegation
      document.addEventListener('input', function(e) {
        if (e.target.classList && e.target.classList.contains('column-filter')) {
          handleSearchAndFilter();
        }
      });
      
      // Xử lý nút hiện tất cả
      document.getElementById('hien-tat-ca-btn').addEventListener('click', function() {
        document.getElementById('tim-kiem').value = '';
        document.getElementById('nam').value = '';
        
        document.querySelectorAll('.column-filter').forEach(input => {
          input.value = '';
        });
        
        handleSearchAndFilter();
        showNotification('Đã hiển thị tất cả dữ liệu', true, true);
      });
      
      // Xử lý nút xuất Excel
      document.getElementById('xuat-excel-btn').addEventListener('click', exportToExcel);
    });
  </script>
</body>
</html>
